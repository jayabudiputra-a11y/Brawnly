      ⚠️  CRITICAL — WHY THE FRAME-SRC ERRORS KEEP APPEARING
      ═══════════════════════════════════════════════════════════════════════

      The browser console shows:
        "frame-src 'self' blob: data: https://www.youtube.com
         https://player.vimeo.com". The request has been blocked.

      That CSP string is NOT from this file. index.html meta-tag CSP already
      has all Google domains listed. The error comes from a SERVER-SENT
      Content-Security-Policy HTTP response header set by your hosting
      platform (Netlify / Vercel / Cloudflare Pages).

      ► A <meta http-equiv="Content-Security-Policy"> tag CANNOT override
        a server-sent header. Both policies are applied simultaneously and
        the browser enforces the stricter of the two.

      FIX LOCATIONS (choose the one matching your host):
      ──────────────────────────────────────────────────
      • Netlify  → public/_headers   (see _headers file in this repo)
      • Vercel   → vercel.json       headers[] array
      • Cloudflare Pages → Functions/middleware or _headers file
      • Apache   → .htaccess         Header always set Content-Security-Policy
      • Nginx    → nginx.conf        add_header Content-Security-Policy

      The complete frame-src value you need in the server header is at the
      bottom of the meta tag below — copy it verbatim.

      New domains added in this fix vs previous version:
        https://player.vimeo.com          ← was in server header, now in meta too
        https://googleads.g.doubleclick.net ← AdSense iframe host
        https://*.adtrafficquality.google  ← ad traffic quality (ep1, ep2…)
        https://ep1.adtrafficquality.google
        https://ep2.adtrafficquality.google
        https://fundingchoicesmessages.google.com ← GDPR consent
        https://accounts.google.com        ← Google identity frames
        https://cse.google.com             ← Custom Search frames
        https://*.google.com               ← wildcard all *.google.com
        blob: data:                        ← AdSense uses blob/data iframes
      ═══════════════════════════════════════════════════════════════════════
    -->
